<script>
/* ============================================================
 * 1) 전역 유틸 및 상태

const LS_KEY = 'ljy_dollar_voucher_v1';

const State = {
  page: 'dashboard',
  theme: 'dark',
  vouchers: [],     // 작성된 전표 이력
  mappings: [],     // 적요 → 계정과목 매핑 룰
  favorites: [],    // 즐겨찾기 계정과목
  draft: null,      // 신규 작성 중인 임시 데이터
  charts: {}        // Chart.js 인스턴스
};

// XSS 방어
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
const fmtUSD = n => '$' + (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtKRW = n => '₩' + Math.round(Number(n)||0).toLocaleString('ko-KR');
const fmtNum = n => (Number(n)||0).toLocaleString('ko-KR');
const todayStr = () => new Date().toISOString().slice(0,10);
const uid = () => 'V' + Date.now().toString(36) + Math.random().toString(36).slice(2,6).toUpperCase();

/* ============================================================
 * 2) 토스트 / 모달
 * ============================================================ */
function toast(msg, type='success') {
  const w = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  const icon = type==='success'?'fa-circle-check'
              :type==='error'?'fa-circle-xmark'
              :type==='warn'?'fa-triangle-exclamation':'fa-circle-info';
  el.innerHTML = `<div class="flex items-start gap-3">
    <i class="fa-solid ${icon} text-xl mt-0.5"></i>
    <div class="text-sm leading-relaxed">${esc(msg)}</div>
  </div>`;
  w.appendChild(el);
  setTimeout(()=> { el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 2800);
}

function openModal(html, opts={}) {
  const w = document.getElementById('modalWrap');
  const wrap = document.createElement('div');
  wrap.className = 'modal-backdrop';
  wrap.innerHTML = `<div class="glass-strong rounded-2xl ${opts.size||'max-w-2xl'} w-full mx-4 p-6 animate-slide-up max-h-[90vh] overflow-y-auto scrollbar">
    ${html}
  </div>`;
  wrap.addEventListener('click', e => {
    if (e.target === wrap && !opts.persistent) wrap.remove();
  });
  w.appendChild(wrap);
  return wrap;
}
function closeModals() { document.getElementById('modalWrap').innerHTML = ''; }

/* ============================================================
 * 3) 데이터 영속화 (LocalStorage)
 * ============================================================ */
function saveLS() {
  try {
    const payload = {
      vouchers: State.vouchers,
      mappings: State.mappings,
      favorites: State.favorites,
      theme: State.theme
    };
    localStorage.setItem(LS_KEY, JSON.stringify(payload));
  } catch (e) {
    console.error('LS 저장 실패', e);
    toast('저장에 실패했습니다: ' + e.message, 'error');
  }
}
function loadLS() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    State.vouchers = d.vouchers || [];
    State.mappings = d.mappings || [];
    State.favorites = d.favorites || [];
    State.theme = d.theme || 'dark';
    return true;
  } catch (e) {
    console.error('LS 로드 실패', e);
    return false;
  }
}

function buildVoucherFromSample(b, rate) {
  const krw = Math.round(b.usd * rate);
  const isAsset = ['외화예금','원재료'].includes(b.account);
  const isRevenue = ['이자수익'].includes(b.account);
  let debit, credit;
  if (b.account === '외화예금') {
    // 송금 입금: 차변 외화예금 / 대변 보통예금
    debit  = { account:'외화예금', usd:b.usd, krw, remark:b.remark };
    credit = { account:'보통예금', usd:b.usd, krw, remark:'KRW 출금' };
  } else if (isRevenue) {
    // 이자수익: 차변 외화예금 / 대변 이자수익
    debit  = { account:'외화예금', usd:b.usd, krw, remark:'이자 입금' };
    credit = { account:b.account,  usd:b.usd, krw, remark:b.remark };
  } else if (b.account === '외환차손익') {
    debit  = { account:'보통예금',     usd:b.usd, krw, remark:'환전 KRW 수령' };
    credit = { account:'외환차익',     usd:b.usd, krw, remark:b.remark };
  } else {
    // 비용 지출: 차변 비용 / 대변 외화예금
    debit  = { account:b.account,  usd:b.usd, krw, remark:b.remark };
    credit = { account:'외화예금', usd:b.usd, krw, remark:b.remark };
  }
  return {
    id: uid(),
    date: b.date,
    dept: b.dept,
    approved: true,
    evidence: ['청구서', '품의서'],
    rate,
    entries: [{ debit, credit }],
    totalUSD: b.usd,
    totalKRW: krw,
    verified: true,
    createdAt: new Date(b.date + 'T09:00:00').toISOString()
  };
}

/* ============================================================
 * 5) 계정과목 자동 판단
 * ============================================================ */
function suggestAccount(remark) {
  if (!remark) return null;
  const r = remark.toLowerCase();
  for (const m of State.mappings) {
    if (r.includes(m.keyword.toLowerCase())) {
      return { account: m.account, rule: m, confidence: 'high' };
    }
  }
  // 부분 매칭
  for (const m of State.mappings) {
    const tokens = m.keyword.split(/\s+/);
    for (const t of tokens) {
      if (t.length >= 2 && r.includes(t.toLowerCase())) {
        return { account: m.account, rule: m, confidence: 'mid' };
      }
    }
  }
  return { account: '미분류', rule: null, confidence: 'low' };
}

function autoJournalize(remark, account, usd, krw) {
  // 계정 성격으로 차/대변 자동 결정
  const expenseAccs = ['지급수수료','현장운영비','급여','이자비용','외주비','여비교통비','통신비','세금과공과','보험료'];
  const revenueAccs = ['이자수익','외환차익'];
  const assetAccs   = ['외화예금','보통예금','원재료'];

  if (expenseAccs.includes(account)) {
    return {
      debit:  { account, remark, usd, krw },
      credit: { account:'외화예금', remark, usd, krw }
    };
  }
  if (revenueAccs.includes(account)) {
    return {
      debit:  { account:'외화예금', remark, usd, krw },
      credit: { account, remark, usd, krw }
    };
  }
  if (account === '외화예금') {
    return {
      debit:  { account:'외화예금', remark, usd, krw },
      credit: { account:'보통예금', remark, usd, krw }
    };
  }
  if (account === '외환차손익') {
    return {
      debit:  { account:'보통예금', remark, usd, krw },
      credit: { account:'외환차익', remark, usd, krw }
    };
  }
  // 기본: 차변 미분류
  return {
    debit:  { account: account||'미분류', remark, usd, krw },
    credit: { account:'외화예금', remark, usd, krw }
  };
}

function drawCharts(monthVouchers) {
  Object.values(State.charts).forEach(c => { try { c.destroy(); } catch(e){} });

function getAllAccounts() {
  const set = new Set();
  State.mappings.forEach(m => set.add(m.account));
  ['외화예금','보통예금','지급수수료','현장운영비','급여','외환차익','이자수익','이자비용','외주비','여비교통비','통신비','세금과공과','보험료','원재료','미분류'].forEach(a => set.add(a));
  return Array.from(set);
}

/* ----- Draft 이벤트 바인딩 ----- */
function bindDraftEvents() {
  const d = State.draft;

  // 공통: 부모 이동
  const goStep = n => { d.step = n; renderNewVoucher(); };

  // Step 1
  const fDept = document.getElementById('fDept');
  if (fDept) fDept.addEventListener('change', e => d.dept = e.target.value);
  const fDate = document.getElementById('fDate');
  if (fDate) fDate.addEventListener('change', e => d.date = e.target.value);
  const fRate = document.getElementById('fRate');
  if (fRate) fRate.addEventListener('change', e => {
    d.rate = Number(e.target.value) || 1350;
    d.txs.forEach(t => t.krw = Math.round((Number(t.usd)||0) * d.rate));
  });
  document.querySelectorAll('.evChk').forEach(c => c.addEventListener('change', () => {
    d.evidence = Array.from(document.querySelectorAll('.evChk:checked')).map(x => x.value);
  }));
  const fApproved = document.getElementById('fApproved');
  if (fApproved) fApproved.addEventListener('change', e => d.approved = e.target.checked);

  document.getElementById('bResetDraft')?.addEventListener('click', () => {
    State.draft = createBlankDraft();
    renderNewVoucher();
    toast('초안을 초기화했습니다.', 'info');
  });
  document.getElementById('bNext1')?.addEventListener('click', () => {
    if (!d.approved) {
      openModal(`
        <div class="text-center">
          <div class="w-16 h-16 rounded-full bg-amber-500/20 flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-triangle-exclamation text-3xl text-amber-400"></i>
          </div>
          <h3 class="text-xl font-black mb-2">수정 요구 사항</h3>
          <p class="text-sm opacity-75 mb-4">결재가 완료되지 않았습니다. 현업부서 보완 절차를 진행해 주세요.</p>
          <div class="text-left bg-amber-500/10 border border-amber-400/30 rounded-xl p-4 mb-5 text-sm">
            <div class="font-bold mb-2"><i class="fa-solid fa-list-check mr-2"></i>보완 요청 항목</div>
            <ul class="list-disc pl-5 space-y-1 opacity-90">
              <li>결재라인 ${esc(d.dept)} 담당자 → 부서장 → 회계부장 순으로 결재 완료</li>
              <li>제출 증빙(${esc(d.evidence.join(', ')||'-')}) 원본 첨부 여부 재확인</li>
              <li>적용 환율 ${d.rate.toLocaleString()}원의 기준일 확인</li>
            </ul>
          </div>
          <div class="flex gap-3 justify-center">
            <button onclick="closeModals()" class="btn-ghost px-5 py-2 rounded-lg text-sm">닫기</button>
            <button onclick="State.draft.approved=true;closeModals();go('new')" class="btn-gold px-5 py-2 rounded-lg text-sm font-bold">결재 완료 처리</button>
          </div>
        </div>`);
      return;
    }
    goStep(2);
  });

  // Step 2
  const bAddRow = document.getElementById('bAddRow');
  if (bAddRow) bAddRow.addEventListener('click', () => {
    d.txs.push({ date: d.date, remark:'', usd:0, krw:0, account:'', side:'' });
    renderDraftStep();
  });
  document.querySelectorAll('#txBody input').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = Number(e.target.dataset.i);
      const f = e.target.dataset.f;
      d.txs[i][f] = (f==='usd') ? Number(e.target.value)||0 : e.target.value;
      if (f==='usd') d.txs[i].krw = Math.round(d.txs[i].usd * d.rate);
      if (f==='usd') {
        const td = e.target.closest('tr').children[3];
        if (td) td.textContent = fmtKRW(d.txs[i].krw);
      }
    });
  });
  document.querySelectorAll('.bDelRow').forEach(b => b.addEventListener('click', e => {
    const i = Number(e.currentTarget.dataset.i);
    d.txs.splice(i,1);
    if (d.txs.length === 0) d.txs.push({ date:d.date, remark:'', usd:0, krw:0, account:'', side:'' });
    renderDraftStep();
  }));
  document.getElementById('fXlsx')?.addEventListener('change', handleXlsxUpload);
  document.getElementById('bPrev2')?.addEventListener('click', () => goStep(1));
  document.getElementById('bNext2')?.addEventListener('click', () => {
    const valid = d.txs.filter(t => t.remark && Number(t.usd) > 0);
    if (valid.length === 0) { toast('적요와 USD 금액을 입력해 주세요.', 'warn'); return; }
    d.txs = valid;
    goStep(3);
  });

  // Step 3
  document.querySelectorAll('.accSel').forEach(sel => sel.addEventListener('change', e => {
    const i = Number(e.target.dataset.i);
    d.txs[i].account = e.target.value;
  }));
  document.getElementById('bPrev3')?.addEventListener('click', () => goStep(2));
  document.getElementById('bNext3')?.addEventListener('click', () => goStep(4));

  // Step 4
  document.getElementById('bPrev4')?.addEventListener('click', () => goStep(3));
  document.getElementById('bPreview')?.addEventListener('click', showVoucherPreview);
  document.getElementById('bSaveOnly')?.addEventListener('click', () => {
    saveCurrentVoucher();
    toast('이력에 저장되었습니다.');
  });
  document.getElementById('bFinalize')?.addEventListener('click', () => {
    saveCurrentVoucher();
    showVoucherPreview(true);
  });
}

/* ----- 엑셀 업로드 처리 ----- */
function handleXlsxUpload(e) {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const wb = XLSX.read(new Uint8Array(ev.target.result), { type:'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' });
      if (rows.length < 2) { toast('데이터가 없습니다.', 'warn'); return; }
      const d = State.draft;
      const newTxs = [];
      for (let i=1; i<rows.length; i++) {
        const r = rows[i];
        if (!r || r.length === 0) continue;
        let date = r[0], remark = r[1], usd = r[2];
        if (typeof date === 'number') {
          // 엑셀 시리얼
          const dd = XLSX.SSF.parse_date_code(date);
          if (dd) date = `${dd.y}-${String(dd.m).padStart(2,'0')}-${String(dd.d).padStart(2,'0')}`;
        }
        usd = Number(String(usd).replace(/[,$\s]/g,''))||0;
        if (!remark || usd <= 0) continue;
        newTxs.push({ date:String(date).slice(0,10), remark:String(remark), usd, krw:Math.round(usd*d.rate), account:'', side:'' });
      }
      if (newTxs.length === 0) { toast('가져올 유효한 행이 없습니다.', 'warn'); return; }
      d.txs = newTxs;
      renderDraftStep();
      toast(`${newTxs.length}건 가져왔습니다.`, 'success');
    } catch (err) {
      console.error(err);
      toast('엑셀 파싱 오류: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(f);
}

  const totalCredit = entries.reduce((s,e)=> s + e.credit.usd, 0);
  const balanced = Math.abs(totalDebit-totalCredit) < 0.01;

/* ----- 출력 함수들 ----- */
function exportPDF() {
  try {
    const p = State._lastPreview;
    if (!p) { toast('미리보기 후 사용 가능합니다.', 'warn'); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit:'mm', format:'a4' });
    doc.setFontSize(18);
    doc.text('Substitute Voucher (USD)', 14, 18);
    doc.setFontSize(10);
    doc.text(`Date: ${p.d.date} | Dept: ${p.d.dept} | Rate: ${p.d.rate}`, 14, 26);
    doc.text(`Evidence: ${p.d.evidence.join(', ')||'-'}`, 14, 32);
    const head = [['No','Debit Account','Debit (USD)','Credit Account','Credit (USD)','Remark']];
    const body = p.entries.map((e,i) => [
      i+1, e.debit.account, e.debit.usd.toFixed(2),
      e.credit.account, e.credit.usd.toFixed(2),
      e.debit.remark
    ]);
    body.push(['Total','', p.totalDebit.toFixed(2), '', p.totalCredit.toFixed(2),'']);
    doc.autoTable({ head, body, startY: 40, styles:{ fontSize:9, cellPadding:2 }, headStyles:{ fillColor:[5,150,105] } });
    const bal = Math.abs(p.totalDebit - p.totalCredit) < 0.01;
    doc.setTextColor(bal? 16:200, bal?185:0, bal?129:0);
    doc.text(bal ? 'Verified: Debit equals Credit.' : 'Mismatch detected!', 14, doc.lastAutoTable.finalY + 10);
    doc.save(`voucher_${p.d.date}.pdf`);
    toast('PDF가 저장되었습니다.');
  } catch (e) { toast('PDF 생성 실패: '+e.message,'error'); }
}

function exportXLSX() {
  try {
    const p = State._lastPreview;
    if (!p) { toast('미리보기 후 사용 가능합니다.', 'warn'); return; }
    const aoa = [
      ['대체전표'],['작성일자',p.d.date,'제출부서',p.d.dept,'환율',p.d.rate],
      ['관련증빙',p.d.evidence.join(', ')], [],
      ['No','차변 계정과목','차변 USD','대변 계정과목','대변 USD','적요']
    ];
    p.entries.forEach((e,i)=> aoa.push([i+1, e.debit.account, e.debit.usd, e.credit.account, e.credit.usd, e.debit.remark]));
    aoa.push(['합계','', p.totalDebit, '', p.totalCredit, '']);
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '대체전표');
    XLSX.writeFile(wb, `voucher_${p.d.date}.xlsx`);
    toast('엑셀이 저장되었습니다.');
  } catch (e) { toast('엑셀 저장 실패: '+e.message,'error'); }
}

function copyVoucherText() {
  try {
    const p = State._lastPreview;
    if (!p) return;
    let txt = `### 대체전표\n* 작성일자: ${p.d.date}\n* 부서: ${p.d.dept}\n* 환율: ${p.d.rate}\n* 증빙: ${p.d.evidence.join(', ')}\n\n`;
    txt += '| 차변 계정과목 | 차변 USD | 대변 계정과목 | 대변 USD | 적요 |\n|---|---:|---|---:|---|\n';
    p.entries.forEach(e => { txt += `| ${e.debit.account} | ${e.debit.usd.toFixed(2)} | ${e.credit.account} | ${e.credit.usd.toFixed(2)} | ${e.debit.remark} |\n`; });
    txt += `| **합계** | **${p.totalDebit.toFixed(2)}** | **합계** | **${p.totalCredit.toFixed(2)}** | |\n`;
    navigator.clipboard.writeText(txt);
    toast('클립보드에 복사되었습니다.');
  } catch (e) { toast('복사 실패: '+e.message,'error'); }
}

function saveCurrentVoucher() {
  const d = State.draft;
  const entries = d.txs.map(t => autoJournalize(t.remark, t.account, Number(t.usd)||0, Math.round((Number(t.usd)||0) * d.rate)));
  const totalUSD = entries.reduce((s,e)=> s + e.debit.usd, 0);
  const totalKRW = entries.reduce((s,e)=> s + e.debit.krw, 0);
  const balanced = Math.abs(totalUSD - entries.reduce((s,e)=>s+e.credit.usd,0)) < 0.01;

  const v = {
    id: uid(),
    date: d.date,
    dept: d.dept,
    approved: d.approved,
    evidence: d.evidence.slice(),
    rate: d.rate,
    entries,
    totalUSD,
    totalKRW,
    verified: balanced,
    createdAt: new Date().toISOString()
  };
  State.vouchers.unshift(v);
  saveLS();
}

 * ============================================================ */
function bindNav() {
  document.querySelectorAll('[data-page]').forEach(b => b.addEventListener('click', () => go(b.dataset.page)));
  document.getElementById('btnTheme').addEventListener('click', toggleTheme);
  document.getElementById('btnSampleReset').addEventListener('click', () => {
    if (!confirm('샘플 데이터로 초기화하시겠습니까? (기존 이력/룰 삭제)')) return;
    localStorage.removeItem(LS_KEY);
    State.vouchers = []; State.mappings = []; State.favorites = [];
    ensureInitialData();
    go(State.page);
    toast('샘플 데이터로 초기화되었습니다.', 'info');
  });
  document.getElementById('btnQuickNew').addEventListener('click', () => {
    State.draft = createBlankDraft();
    State.draft.approved = true;
    go('new');
  });
}

function toggleTheme() {
  State.theme = State.theme === 'dark' ? 'light' : 'dark';
  document.body.classList.toggle('light', State.theme === 'light');
  document.getElementById('themeIcon').className = State.theme==='dark' ? 'fa-solid fa-moon w-4' : 'fa-solid fa-sun w-4';
  document.getElementById('themeLabel').textContent = State.theme==='dark' ? '라이트 모드' : '다크 모드';
  saveLS();
  if (State.page === 'dashboard') drawCharts(State.vouchers.filter(v => v.date.startsWith(todayStr().slice(0,7))));
}

/* ============================================================
 * 12) 초기화
 * ============================================================ */
(function init() {
  try {
    ensureInitialData();
    if (State.theme === 'light') document.body.classList.add('light');
    document.getElementById('themeIcon').className = State.theme==='dark' ? 'fa-solid fa-moon w-4' : 'fa-solid fa-sun w-4';
    document.getElementById('themeLabel').textContent = State.theme==='dark' ? '라이트 모드' : '다크 모드';
    document.getElementById('topDate').textContent = todayStr();
    bindNav();
    go('dashboard');
    setTimeout(() => toast('시스템 준비 완료 · 샘플 전표 ' + State.vouchers.length + '건 로드됨'), 200);
  } catch (e) {
    console.error('초기화 오류', e);
    alert('초기화 실패: ' + e.message);
  }
})();
</script>
</body>
</html>
