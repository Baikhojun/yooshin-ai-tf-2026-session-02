<script>
/* ============================================================
   이 파일의 역할: 이태정(총무부 인사팀) 급여변동자료 자동 생성 시스템
   - ERP 인사발령 → 자동 분류(신규/퇴사/육아휴직/기타) → 종합 엑셀 → 회계부 전달
   ============================================================ */

// ============== 상수 / 키 ==============
const STORAGE_KEY = 'ltj_salary_change_v1';
const HISTORY_KEY = 'ltj_salary_history_v1';

// ============== 유틸 ==============
function escapeHTML(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function uid(prefix='id') { return prefix + '_' + Math.random().toString(36).slice(2, 10); }
function fmtDate(d) {
  if (!d) return '';
  try { const dt = new Date(d); if (isNaN(dt)) return d;
    const y=dt.getFullYear(),m=String(dt.getMonth()+1).padStart(2,'0'),da=String(dt.getDate()).padStart(2,'0');
    return `${y}-${m}-${da}`;
  } catch(e) { return d; }
}
function todayStr() { return fmtDate(new Date()); }
function nowStamp() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function currentTargetMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

// ============== 토스트 ==============
function toast(msg, type='info', timeout=2800) {
  try {
    const container = document.getElementById('toastContainer');
    const colors = {
      success: { ic: 'fa-circle-check', bg: 'from-emerald-400 to-emerald-600' },
      error:   { ic: 'fa-circle-exclamation', bg: 'from-rose-400 to-rose-600' },
      warn:    { ic: 'fa-triangle-exclamation', bg: 'from-amber-400 to-amber-600' },
      info:    { ic: 'fa-circle-info', bg: 'from-purple-400 to-purple-600' },
    };
    const c = colors[type] || colors.info;
    const div = document.createElement('div');
    div.className = `toast glass rounded-2xl px-5 py-3.5 flex items-center gap-3 max-w-sm shadow-glass`;
    div.innerHTML = `
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br ${c.bg} flex items-center justify-center text-white flex-shrink-0">
        <i class="fa-solid ${c.ic}"></i>
      </div>
      <div class="text-sm font-medium leading-snug">${escapeHTML(msg)}</div>`;
    container.appendChild(div);
    setTimeout(() => { div.style.opacity = '0'; div.style.transform = 'translateX(40px)'; setTimeout(()=>div.remove(), 350); }, timeout);
  } catch(e) { console.error('toast 실패', e); }
}

// ============== 모달 ==============
function openModal({title, bodyHtml, footerHtml=''}) {
  const modal = document.getElementById('modal');
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;

let _charts = {};
function drawCharts() {
  try {
    const isDark = document.body.classList.contains('dark');
    const txt = isDark ? '#f3e8ff' : '#4c1d4d';
    const grid = isDark ? 'rgba(244,114,182,0.15)' : 'rgba(219,39,119,0.12)';
    // destroy old
    Object.values(_charts).forEach(c => { try { c.destroy(); } catch(e){} });

    // monthly trend (mock + 현재)
    const months = [];
    const join = [];
    const leave = [];
    const today = new Date();
    for (let i=5; i>=0; i--) {
      const d = new Date(today.getFullYear(), today.getMonth()-i, 1);
      const lbl = `${d.getMonth()+1}월`;
      months.push(lbl);
      // mock: 0~i 추정, 현재월은 실제 데이터
      if (i === 0) { join.push(state.newcomers.length); leave.push(state.leavers.length); }
      else { join.push(3 + ((i*7+2)%6)); leave.push(2 + ((i*5+1)%5)); }
    }
    const ctxM = document.getElementById('chartMonthly').getContext('2d');
    _charts.monthly = new Chart(ctxM, {
      type: 'bar',
      data: {
        labels: months,
        datasets: [
          { label:'입사', data: join, backgroundColor: 'rgba(236,72,153,0.85)', borderRadius:8 },
          { label:'퇴사', data: leave, backgroundColor: 'rgba(139,92,246,0.85)', borderRadius:8 },
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{labels:{color: txt, font:{family:'Noto Sans KR'}}}, tooltip:{ bodyFont:{family:'Noto Sans KR'} } },
        scales: {
          x:{ ticks:{color:txt}, grid:{color:'transparent'}},
          y:{ ticks:{color:txt}, grid:{color:grid}, beginAtZero:true, precision:0 }
        }
      }
    });

    // type distribution
    const ctxT = document.getElementById('chartType').getContext('2d');
    _charts.type = new Chart(ctxT, {
      type: 'doughnut',
      data: {
        labels: ['신규입사', '퇴사', '육아휴직', '기타'],
        datasets: [{
          data: [state.newcomers.length, state.leavers.length, state.parental.length, state.others.length],
          backgroundColor: ['#10b981', '#f59e0b', '#a855f7', '#0ea5e9'],
          borderWidth: 0,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '62%',
        plugins:{ legend:{position:'bottom', labels:{color:txt, font:{family:'Noto Sans KR', size:12}, boxWidth:12, padding:14}} }
      }
    });
  } catch (e) { console.error('차트 그리기 실패', e); toast('차트 렌더 실패', 'error'); }
}

function handleFile(file) {
  try {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        _previewRows = rows;
        renderPreview(rows);
        toast(`${rows.length}건을 파싱했습니다`, 'success');
      } catch (err) {
        console.error(err); toast('엑셀 파싱 실패: ' + err.message, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  } catch(e) { console.error(e); toast('파일 읽기 실패', 'error'); }
}

function renderPreview(rows) {
  const sec = document.getElementById('previewSection');
  if (!rows.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  const headers = Object.keys(rows[0]);
  const table = document.getElementById('previewTable');
  table.innerHTML = `
    <thead><tr>${headers.map(h => `<th>${escapeHTML(h)}</th>`).join('')}</tr></thead>
    <tbody>${rows.slice(0,30).map(r => `
      <tr>${headers.map(h => `<td>${escapeHTML(r[h])}</td>`).join('')}</tr>`).join('')}
      ${rows.length>30 ? `<tr><td colspan="${headers.length}" class="text-center py-3 text-slate-400">... 외 ${rows.length-30}건</td></tr>` : ''}
    </tbody>`;
  document.getElementById('applyImport').onclick = () => importPreviewToState(rows);
}

function importPreviewToState(rows) {
  try {
    let nNew=0, nLeave=0, nPar=0, nOth=0;
    rows.forEach(r => {
      const cat = String(r['발령구분']||r['구분']||'').trim();
      const base = {
        empNo: String(r['사번']||r['사원번호']||'').trim(),
        name:  String(r['성명']||r['이름']||'').trim(),
        dept:  String(r['부서']||'').trim(),
        position: String(r['직위']||r['직급']||'').trim(),
        memo:  String(r['비고']||'').trim(),
      };
      const date = fmtDate(r['발령일']||r['일자']||r['날짜']||'');
      if (cat.includes('입사') || cat.includes('신규')) {
        state.newcomers.push({ id:uid('n'), ...base, joinDate:date, account:'', license:'', healthCheck:'예정' });
        nNew++;
      } else if (cat.includes('퇴사') || cat.includes('퇴직')) {
        state.leavers.push({ id:uid('l'), ...base, leaveDate:date, reason: cat });
        nLeave++;
      } else if (cat.includes('육아') || cat.includes('휴직')) {
        state.parental.push({ id:uid('p'), ...base, startDate:date, endDate:'', months:12 });
        nPar++;
      } else {
        state.others.push({ id:uid('o'), ...base, category:cat||'기타', startDate:date, endDate:'', detail:cat });
        nOth++;
      }
    });
    saveState();
    toast(`자동 분류 완료: 신규 ${nNew} · 퇴사 ${nLeave} · 휴직 ${nPar} · 기타 ${nOth}`, 'success', 3800);
    setView('classify');
  } catch(e) { console.error(e); toast('분류 적용 실패', 'error'); }
}

function downloadTemplate() {
  try {
    const headers = [['사번','성명','부서','발령일','발령구분','비고']];
    const rows = [
      ['Y14906','홍길동','총무부','2026-06-20','신규입사','정규직'],
      ['Y10231','한지원','건축사업부','2026-06-30','퇴사','개인사유'],
      ['Y08921','장수빈','총무부','2026-06-01','육아휴직','첫째 출산'],
    ];
    const ws = XLSX.utils.aoa_to_sheet([...headers, ...rows]);
    ws['!cols'] = headers[0].map(() => ({ wch: 14 }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '인사발령양식');
    XLSX.writeFile(wb, 'ERP_인사발령_양식.xlsx');
    toast('양식 파일을 다운로드했습니다', 'success');
  } catch(e) { console.error(e); toast('양식 생성 실패', 'error'); }
}

function addManualEntry() {
  try {
    const empNo = document.getElementById('m_empNo').value.trim();
    const name  = document.getElementById('m_name').value.trim();
    if (!empNo || !name) { toast('사번과 성명은 필수입니다', 'warn'); return; }
    const dept = document.getElementById('m_dept').value.trim();
    const date = document.getElementById('m_date').value;
    const cat  = document.getElementById('m_category').value;
    const memo = document.getElementById('m_memo').value;
    const base = { empNo, name, dept, memo };
    if (cat === '신규입사') state.newcomers.push({ id:uid('n'), ...base, joinDate:date, position:'', account:'', license:'', healthCheck:'예정' });
    else if (cat === '퇴사') state.leavers.push({ id:uid('l'), ...base, leaveDate:date, position:'', reason:'' });
    else if (cat === '육아휴직') state.parental.push({ id:uid('p'), ...base, startDate:date, endDate:'', months:12, position:'' });
    else state.others.push({ id:uid('o'), ...base, category:cat, startDate:date, endDate:'', detail:'' });
    saveState();
    toast(`${name}님을 ${cat}로 추가했습니다`, 'success');
    ['m_empNo','m_name','m_dept','m_memo'].forEach(id => document.getElementById(id).value='');
  } catch(e) { console.error(e); toast('추가 실패', 'error'); }
}

function uniqueDepts() {
  const set = new Set();
  state.newcomers.forEach(r=>set.add(r.dept));
  state.leavers.forEach(r=>set.add(r.dept));
  state.parental.forEach(r=>set.add(r.dept));
  state.others.forEach(r=>set.add(r.dept));
  return [...set].filter(Boolean).sort();
}

function filterSort(list, dateKey) {
  const q = _classifyFilter.q.trim().toLowerCase();
  const dept = _classifyFilter.dept;
  let result = list.filter(r => {
    if (dept && r.dept !== dept) return false;
    if (!q) return true;
    return (r.empNo||'').toLowerCase().includes(q) ||
           (r.name||'').toLowerCase().includes(q) ||
           (r.dept||'').toLowerCase().includes(q);
  });
  result.sort((a,b) => {
    let va, vb;
    if (_classifySort.key === 'name') { va=a.name||''; vb=b.name||''; }
    else { va=a[dateKey]||''; vb=b[dateKey]||''; }
    if (va < vb) return _classifySort.dir==='asc' ? -1 : 1;
    if (va > vb) return _classifySort.dir==='asc' ? 1 : -1;
    return 0;
  });
  return result;
}

function renderTabBody() {
  const body = document.getElementById('tabBody');
  if (!body) return;
  const tab = _classifyActiveTab;
  let html = '';
  if (tab === 'newcomers') {
    const rows = filterSort(state.newcomers, 'joinDate');
    html = renderNewcomersTab(rows);
  } else if (tab === 'leavers') {
    const rows = filterSort(state.leavers, 'leaveDate');
    html = renderLeaversTab(rows);
  } else if (tab === 'parental') {
    const rows = filterSort(state.parental, 'startDate');
    html = renderParentalTab(rows);
  } else if (tab === 'others') {
    const rows = filterSort(state.others, 'startDate');
    html = renderOthersTab(rows);
  }
  body.innerHTML = html;
  bindRowEvents();
}

function bindRowEvents() {
  const body = document.getElementById('tabBody');
  if (!body) return;
  // inline edit
  body.querySelectorAll('input.inline-input, select.inline-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const tr = inp.closest('tr');
      const list = tr.dataset.list;
      const id = tr.dataset.id;
      const key = inp.dataset.key;
      const target = state[list].find(r => r.id === id);
      if (!target) return;
      target[key] = inp.value;
      saveState();
    });
  });
  // delete row
  body.querySelectorAll('.del-row').forEach(btn => {
    btn.addEventListener('click', () => {
      const tr = btn.closest('tr');
      const list = tr.dataset.list;
      const id = tr.dataset.id;
      state[list] = state[list].filter(r => r.id !== id);
      saveState();
      renderTabBody();
      toast('삭제되었습니다', 'success', 1600);
    });
  });
  // add row
  body.querySelectorAll('.add-row-btn').forEach(btn => {
    btn.addEventListener('click', () => addEmptyRow(btn.dataset.add));
  });
}

function addEmptyRow(list) {
  const today = todayStr();
  const tmpl = {
    newcomers: () => ({ id:uid('n'), empNo:'', name:'', dept:'', position:'', joinDate:today, account:'', license:'', healthCheck:'예정', memo:'' }),
    leavers:   () => ({ id:uid('l'), empNo:'', name:'', dept:'', position:'', leaveDate:today, reason:'', memo:'' }),
    parental:  () => ({ id:uid('p'), empNo:'', name:'', dept:'', position:'', startDate:today, endDate:'', months:12, memo:'' }),
    others:    () => ({ id:uid('o'), empNo:'', name:'', dept:'', category:'전보', startDate:today, endDate:'', detail:'', memo:'' }),
  };
  state[list].push(tmpl[list]());
  saveState();
  renderTabBody();
  toast('빈 행을 추가했습니다', 'success', 1600);
}

        <li><i class="fa-solid fa-check text-emerald-500 mr-2"></i> 시트 1: <b>신규입사</b> - 사번, 성명, 부서, 직위, 입사일, 계좌번호, 자격증, 채용검진여부, 비고</li>
        <li><i class="fa-solid fa-check text-emerald-500 mr-2"></i> 시트 2: <b>퇴사자</b> - 사번, 성명, 부서, 직위, 퇴사일자, 사유, 비고</li>
        <li><i class="fa-solid fa-check text-emerald-500 mr-2"></i> 시트 3: <b>육아휴직</b> - 사번, 성명, 부서, 직위, 휴직시작, 휴직종료, 기간(개월), 비고</li>
        <li><i class="fa-solid fa-check text-emerald-500 mr-2"></i> 시트 4: <b>기타발령</b> - 사번, 성명, 부서, 구분, 시작일, 종료일, 내용, 비고</li>
        <li><i class="fa-solid fa-check text-emerald-500 mr-2"></i> 시트 5: <b>요약</b> - 작성일, 작성자(이태정), 총 변동 인원, 분류별 집계</li>

  root.querySelector('#genMonth').addEventListener('change', e => { state.targetMonth = e.target.value; document.getElementById('targetMonthLabel').textContent = e.target.value; saveState(); });
  root.querySelector('#previewExcel').onclick = previewExcelModal;

function buildSheetData() {
  const newH = [['사번','성명','부서','직위','입사일','계좌번호','자격증','채용검진','비고']];
  const newR = state.newcomers.map(r => [r.empNo, r.name, r.dept, r.position||'', r.joinDate, r.account||'', r.license||'', r.healthCheck||'', r.memo||'']);
  const leH = [['사번','성명','부서','직위','퇴사일자','사유','비고']];
  const leR = state.leavers.map(r => [r.empNo, r.name, r.dept, r.position||'', r.leaveDate, r.reason||'', r.memo||'']);
  const paH = [['사번','성명','부서','직위','휴직시작','휴직종료','기간(개월)','비고']];
  const paR = state.parental.map(r => [r.empNo, r.name, r.dept, r.position||'', r.startDate, r.endDate||'', r.months||'', r.memo||'']);
  const otH = [['사번','성명','부서','구분','시작일','종료일','내용','비고']];
  const otR = state.others.map(r => [r.empNo, r.name, r.dept, r.category||'', r.startDate, r.endDate||'', r.detail||'', r.memo||'']);
  const total = totalCount();
  const sumH = [['항목','값']];
  const sumR = [
    ['작성일', todayStr()],
    ['작성자', '이태정 (총무부 인사팀)'],
    ['대상월', state.targetMonth],
    ['총 변동 인원', total + '명'],
    ['신규입사', state.newcomers.length + '명'],
    ['퇴사자', state.leavers.length + '명'],
    ['육아휴직', state.parental.length + '명'],
    ['기타발령', state.others.length + '명'],
  ];
  return {
    '요약':       { head: sumH, rows: sumR },
    '신규입사':   { head: newH, rows: newR },
    '퇴사자':     { head: leH, rows: leR },
    '육아휴직':   { head: paH, rows: paR },
    '기타발령':   { head: otH, rows: otR },
  };
}

function previewExcelModal() {
  const sheets = buildSheetData();
  let bodyHtml = '<div class="space-y-5">';
  Object.entries(sheets).forEach(([sheetName, data]) => {
    bodyHtml += `
      <div>
        <div class="font-bold text-sm mb-2 flex items-center gap-2">
          <i class="fa-solid fa-table text-rose4 dark:text-rose3"></i> ${escapeHTML(sheetName)} 시트 (${data.rows.length}건)
        </div>
        <div class="overflow-x-auto rounded-xl border border-rose-200/30 dark:border-purple-500/20">
          <table class="pretty-table">
            <thead><tr>${data.head[0].map(h=>`<th>${escapeHTML(h)}</th>`).join('')}</tr></thead>
            <tbody>${data.rows.length ? data.rows.map(r => `<tr>${r.map(c=>`<td>${escapeHTML(c)}</td>`).join('')}</tr>`).join('') : `<tr><td colspan="${data.head[0].length}" class="text-center py-4 text-slate-400">데이터 없음</td></tr>`}</tbody>
          </table>
        </div>
      </div>`;
  });
  bodyHtml += '</div>';
  openModal({
    title: `종합파일 미리보기 · ${state.targetMonth}`,
    bodyHtml,
    footerHtml: `
      <button class="btn-ghost" onclick="closeModal()">닫기</button>
      <button class="btn-primary" onclick="closeModal(); downloadComprehensiveExcel()">
        <i class="fa-solid fa-download mr-1.5"></i> 다운로드
      </button>
    `
  });
}
// 외부에서 호출하기 위해 window 노출
window.closeModal = closeModal;

function downloadComprehensiveExcel() {
  try {
    const sheets = buildSheetData();
    const wb = XLSX.utils.book_new();
    Object.entries(sheets).forEach(([name, data]) => {
      const aoa = [...data.head, ...data.rows];
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = data.head[0].map(() => ({ wch: 14 }));
      XLSX.utils.book_append_sheet(wb, ws, name);
    });
    const fname = `급여변동자료_${state.targetMonth}.xlsx`;
    XLSX.writeFile(wb, fname);
    // 이력 자동 기록
    state.history.unshift({
      date: nowStamp(),
      month: state.targetMonth,
      count: totalCount(),
      status: '엑셀 다운로드',
      method: '다운로드'
    });
    saveState();
    toast(`${fname} 다운로드 완료`, 'success', 3500);
  } catch(e) { console.error(e); toast('엑셀 생성 실패: ' + e.message, 'error'); }
}
window.downloadComprehensiveExcel = downloadComprehensiveExcel;

          </button>

    </section>

    <section class="glass rounded-2xl p-6">
      <h3 class="font-bold text-base mb-3 flex items-center gap-2">
        <i class="fa-solid fa-list-check text-emerald-500"></i> 전달 전 체크리스트
      </h3>

        ${[

          {check: state.newcomers.every(r => r.empNo && r.name), label:'신규입사자의 사번/성명이 모두 입력되어 있다'},
          {check: state.leavers.every(r => r.leaveDate), label:'퇴사자의 퇴사일자가 모두 입력되어 있다'},

  root.querySelector('#downloadExcelInDeliver').onclick = downloadComprehensiveExcel;

  };

[변동 인원 요약]
- 총 변동: ${totalCount()}명
- 신규입사: ${state.newcomers.length}명
- 퇴사자: ${state.leavers.length}명
- 육아휴직: ${state.parental.length}명
- 기타발령(전보/정직 등): ${state.others.length}명

세부 사항은 첨부 엑셀(시트 분리)을 참고 부탁드립니다.
문의사항이 있으시면 언제든 연락 주시기 바랍니다.

이태정 드림
(총무부 인사팀 · 내선 5678)`;
}

function renderHistory(root) {
  root.innerHTML = `
    <section class="glass rounded-2xl p-6">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-xl bg-gradient-to-br from-amber-500 to-orange-500 flex items-center justify-center shadow-lg">
            <i class="fa-solid fa-clock-rotate-left text-white"></i>
          </div>
          <div>
            <h2 class="font-bold text-base">전달 이력</h2>
            <p class="text-xs text-slate-500 dark:text-slate-400">회계부로 전달했던 급여변동자료 이력입니다.</p>
          </div>
        </div>
        <button id="clearHistory" class="btn-ghost !py-1.5 !text-xs">
          <i class="fa-solid fa-broom mr-1"></i> 이력 초기화
        </button>
      </div>

      <div class="overflow-x-auto">
        <table class="pretty-table">
          <thead><tr>
            <th>일시</th><th>대상월</th><th>변동 인원</th><th>방법</th><th>상태</th>
          </tr></thead>
          <tbody>${historyRows()}</tbody>
        </table>
      </div>
    </section>
  `;
  root.querySelector('#clearHistory').onclick = () => {
    if (!confirm('이력을 초기화하시겠습니까?')) return;
    state.history = []; saveState(); renderView();
    toast('이력이 초기화되었습니다', 'success');
  };
}
function historyRows() {
  if (!state.history.length) return `<tr><td colspan="5" class="text-center py-10 text-slate-400">아직 전달 이력이 없습니다</td></tr>`;
  return state.history.map(h => `
    <tr>
      <td class="font-mono text-[12.5px]">${escapeHTML(h.date)}</td>
      <td><span class="badge badge-rose">${escapeHTML(h.month)}</span></td>
      <td class="font-semibold">${escapeHTML(String(h.count))}명</td>
      <td>${escapeHTML(h.method)}</td>
      <td>
        <span class="badge ${h.status==='전달완료' ? 'badge-emerald' : 'badge-purple'}">
          <i class="fa-solid ${h.status==='전달완료' ? 'fa-check' : 'fa-download'}"></i> ${escapeHTML(h.status)}
        </span>
      </td>
    </tr>
  `).join('');
}
