<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출장비 항목 합산 (교육용 placeholder)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">
  <div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-bold text-gray-900">💰 출장비 항목 합산</h1>
    <p class="text-sm text-amber-700 mt-2">교육용 placeholder — 3회차에 교육생 HTML로 교체 예정 · (주)멋진엔지니어링 가공</p>
    <label class="block mt-4 text-sm font-medium">영수증 (일자,항목,금액 CSV 형식)</label>
    <textarea id="input" rows="8" class="w-full border rounded p-2 mt-1 font-mono text-sm" placeholder="2026-05-20,KTX,118000&#10;2026-05-21,식대,35000"></textarea>
    <button onclick="calc()" class="mt-3 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">합산</button>
    <div id="out" class="mt-4 p-3 bg-gray-50 rounded text-sm"></div>
  </div>
  <script>
    function calc() {
      const lines = document.getElementById('input').value.trim().split('\n').filter(Boolean);
      let total = 0, rows = [];
      lines.forEach(l => {
        const p = l.split(',');
        const amt = parseInt(p[2], 10) || 0;
        total += amt;
        rows.push(`<tr><td class="border px-2">${p[0]||''}</td><td class="border px-2">${p[1]||''}</td><td class="border px-2 text-right">${amt.toLocaleString()}</td></tr>`);
      });
      document.getElementById('out').innerHTML = `<table class="w-full border-collapse"><thead><tr class="bg-gray-200"><th class="border px-2">일자</th><th class="border px-2">항목</th><th class="border px-2">금액</th></tr></thead><tbody>${rows.join('')}</tbody></table><p class="mt-2 font-bold">합계: ${total.toLocaleString()}원</p>`;
    }
  </script>
</body>
</html>
