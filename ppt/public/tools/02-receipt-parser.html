<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영수증 텍스트 정리 (교육용 placeholder)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">
  <div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-bold">🧾 영수증 텍스트 정리</h1>
    <p class="text-sm text-amber-700 mt-2">교육용 placeholder · 가공 데이터만 사용</p>
    <label class="block mt-4 text-sm">날겡 영수증 메모</label>
    <textarea id="raw" rows="6" class="w-full border rounded p-2 mt-1 text-sm" placeholder="5/20 KTX 118000&#10;5/21 호텔 89000"></textarea>
    <button onclick="parse()" class="mt-3 bg-green-600 text-white px-4 py-2 rounded">CSV로 정리</button>
    <pre id="out" class="mt-4 p-3 bg-gray-50 rounded text-sm overflow-auto"></pre>
  </div>
  <script>
    function parse() {
      const lines = document.getElementById('raw').value.trim().split('\n').filter(Boolean);
      const csv = ['일자,항목,금액,비고'];
      lines.forEach(l => {
        const m = l.match(/(\d+\/\d+)\s+(\S+)\s+(\d+)/);
        if (m) csv.push(`2026-${m[1].replace('/','-')},${m[2]},${m[3]},`);
        else csv.push(`,,,"${l.replace(/"/g,'')}"`);
      });
      document.getElementById('out').textContent = csv.join('\n');
    }
  </script>
</body>
</html>
