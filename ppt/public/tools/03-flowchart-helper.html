<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>흐름도 도우미 (교육용 placeholder)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">
  <div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-bold">📊 흐름도 도우미</h1>
    <p class="text-sm text-amber-700 mt-2">교육용 placeholder — Mermaid flowchart 미리보기</p>
    <p class="text-sm mt-2"><a href="https://mermaid.live/" target="_blank" class="text-blue-600 underline">mermaid.live</a>에서 편집하는 것을 권장합니다.</p>
    <textarea id="code" rows="12" class="w-full border rounded p-2 mt-3 font-mono text-xs">flowchart TD
    A[("시작 산출물")]
    B[["프로세스"]]:::proc
    C[("결과 산출물")]
    A --> B --> C
    classDef proc fill:#e1f5fe,stroke:#01579b,stroke-width:2px,color:#000</textarea>
    <p class="text-xs text-gray-500 mt-2">위 코드를 복사 → mermaid.live 붙여넣기</p>
  </div>
</body>
</html>
